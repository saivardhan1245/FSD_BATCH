<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container py-4">

<h2 class="mb-4 text-center">
Student Dashboard
</h2>

<div class="row g-4">

<div class="col-md-3">
<div class="card text-center bg-primary text-white">
<div class="card-body">
<h3>500</h3>
<p>Total Students</p>
</div>
</div>
</div>

<div class="col-md-3">
<div class="card text-center bg-success text-white">
<div class="card-body">
<h3>450</h3>
<p>Present</p>
</div>
</div>
</div>

<div class="col-md-3">
<div class="card text-center bg-danger text-white">
<div class="card-body">
<h3>50</h3>
<p>Absent</p>
</div>
</div>
</div>

<div class="col-md-3">
<div class="card text-center bg-warning">
<div class="card-body">
<h3>120</h3>
<p>Placements</p>
</div>
</div>
</div>

</div>

<div class="mt-5">

<input
type="text"
class="form-control mb-3"
placeholder="Search Student">

<div class="table-responsive">

<table class="table table-bordered table-striped">

<thead class="table-dark">

<tr>
<th>Roll No</th>
<th>Name</th>
<th>Branch</th>
<th>Attendance</th>
</tr>

</thead>

<tbody>

<tr>
<td>101</td>
<td>Rahul</td>
<td>CSE</td>
<td><span class="badge bg-success">92%</span></td>
</tr>

<tr>
<td>102</td>
<td>Priya</td>
<td>ECE</td>
<td><span class="badge bg-warning">85%</span></td>
</tr>

<tr>
<td>103</td>
<td>Arjun</td>
<td>IT</td>
<td><span class="badge bg-danger">70%</span></td>
</tr>

</tbody>

</table>

</div>

</div>

<div class="row justify-content-center mt-5">

<div class="col-md-4">

<div class="card text-center">

<img
src="https://picsum.photos/200"
class="card-img-top">

<div class="card-body">

<h5>Student ID Card</h5>

<p>Name: Rahul</p>
<p>Roll No: 101</p>
<p>Branch: CSE</p>

</div>

</div>

</div>

</div>

<button class="btn btn-dark mt-4" id="darkBtn">
Toggle Dark Mode
</button>

</div>

<footer class="bg-dark text-white text-center mt-5 p-3">
<p>© 2026 Student Management Portal</p>
<p>Facebook | Instagram | LinkedIn</p>
</footer>

<script src="js/script.js"></script>

</body>
</html>
